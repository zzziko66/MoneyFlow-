<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>财富视图 · MoneyFlow</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <style>
    .main {
      position: relative;
    }

    .main::before {
      content: '';
      position: absolute;
      top: -5%;
      right: -5%;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(16, 185, 129, 0.05), transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .main > * {
      position: relative;
      z-index: 1;
    }

    .topbar {
      animation: fade-in-up 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .breakdown-charts {
      display: flex;
      gap: 12px;
      width: 100%;
      min-height: 220px;
    }
    .breakdown-bar-wrap {
      flex: 3;
      min-width: 0;
    }
    .breakdown-pie-wrap {
      flex: 2;
      min-width: 0;
    }
    .breakdown-bar-wrap canvas,
    .breakdown-pie-wrap canvas {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body data-page="dashboard">

  <div class="app-shell">

    <aside class="sidebar">
      <div class="sidebar__brand">
        <span class="sidebar__brand-mark">💰</span>
        MoneyFlow
      </div>

      <nav class="sidebar__nav">
        <a href="dashboard.html" class="sidebar__link" data-page="dashboard">
          <span class="sidebar__icon">📊</span> 财富视图
        </a>
        <a href="transactions.html" class="sidebar__link" data-page="transactions">
          <span class="sidebar__icon">📜</span> 账单
        </a>
        <a href="insights.html" class="sidebar__link" data-page="insights">
          <span class="sidebar__icon">💡</span> AI顾问
        </a>
      </nav>

      <div class="sidebar__footer">
        <div class="sidebar__user-wrap">
          <div class="sidebar__user" id="sidebarUserBtn">
            <div class="sidebar__avatar" id="sidebarAvatar">访</div>
            <div>
              <div class="sidebar__user-name" id="sidebarName">访客</div>
              <div id="userTagline">MoneyFlow 用户</div>
            </div>
          </div>
          <div class="sidebar__user-dropdown">
            <button class="dropdown__item" id="editProfileBtn">⚙️ 修改账户</button>
            <div class="sidebar-theme-divider"></div>
            <button class="dropdown__item" id="themeSwitchBtn">🎨 切换主题</button>
            <button class="dropdown__item dropdown__item--danger" id="logoutBtn">⏻ 退出登录</button>
          </div>
        </div>
      </div>
    </aside>

    <main class="main">

      <div class="topbar">
        <div class="topbar__greeting">
          <h1 id="greeting">早上好，访客 👋</h1>
          <p class="topbar__date" id="clock-date">--</p>
        </div>
        <div class="clock" id="clock-time">00:00:00</div>
      </div>

      <div class="stat-grid">

        <div class="tilt-wrapper">
          <div class="card stat-card stat-card--accent tilt-card" id="tiltNetWorth">
            <div class="glare-layer"></div>
            <div class="card__header"><span class="card__title">净资产</span></div>
            <div class="amount-lg" id="statNetWorth">¥0.00</div>
            <p class="stat-card__footnote" id="statNetWorthFootnote">历史收入合计 − 历史支出合计</p>
          </div>
        </div>

        <div class="tilt-wrapper">
          <div class="card stat-card tilt-card" id="tiltExpense">
            <div class="glare-layer"></div>
            <div class="card__header"><span class="card__title">本月支出</span></div>
            <div class="amount-lg amount--expense" id="statMonthExpense">¥0.00</div>
            <p class="stat-card__footnote">
              本月收入 <span class="amount" id="statMonthIncome">+¥0.00</span>
            </p>
          </div>
        </div>

        <div class="tilt-wrapper">
          <div class="card stat-card tilt-card" id="tiltBudget">
            <div class="glare-layer"></div>
            <div class="card__header"><span class="card__title">预算进度</span></div>
            <div class="water-gauge" id="budgetGauge">
              <div class="water-gauge__meta">
                <span class="text-sub">已用 <span class="amount" id="gaugeUsed">¥0.00</span></span>
                <span class="text-sub">预算 <span class="amount" id="gaugeLimit">¥0.00</span></span>
              </div>
              <div class="water-gauge__track">
                <div class="water-gauge__fill"></div>
                <div class="water-gauge__threshold" id="gaugeThreshold" data-label="预警线"></div>
              </div>
              <div class="water-gauge__status">正在计算...</div>
            </div>
          </div>
        </div>

      </div>

      <div class="split-grid">

        <div class="tilt-wrapper">
          <div class="card tilt-card" id="tiltBreakdown">
            <div class="glare-layer"></div>
            <div class="card__header"><h2>本月消费结构</h2></div>
            <div class="breakdown-charts">
              <div class="breakdown-bar-wrap"><canvas id="breakdownBarChart"></canvas></div>
              <div class="breakdown-pie-wrap"><canvas id="breakdownPieChart"></canvas></div>
            </div>
          </div>
        </div>

        <div class="tilt-wrapper">
          <div class="card insight-card tilt-card" id="tiltInsight">
            <div class="glare-layer"></div>
            <div class="card__header"><h2>开始记账</h2></div>
            <div class="insight-box" id="insightBox">
              <span class="insight-box__icon">👋</span>
              正在分析你的消费数据...
            </div>
            <button class="btn btn--primary insight-card__cta" id="openQuickAdd">
              ＋ 记一笔
            </button>
          </div>
        </div>

      </div>

    </main>
  </div>

  <div class="modal-overlay" id="quickAddOverlay">
    <div class="modal">
      <div class="modal__header" style="display:flex;flex-direction:column;align-items:flex-start;gap:2px;">
        <div style="display:flex;width:100%;justify-content:space-between;align-items:center;">
          <h3>记一笔</h3>
          <button class="modal__close" id="quickAddClose" aria-label="关闭">✕</button>
        </div>
        <p id="qaSubtitle" style="font-size:12px;color:var(--text-secondary);font-weight:400;margin:0;"></p>
      </div>

      <div class="type-switch">
        <button class="type-btn is-active" data-type="expense">支出</button>
        <button class="type-btn" data-type="income">收入</button>
      </div>

      <div class="field">
        <label for="qaCategory">分类</label>
        <select id="qaCategory"></select>
      </div>

      <div class="field">
        <label for="qaTitle">事项名称</label>
        <input id="qaTitle" type="text" placeholder="例如：午餐沙拉碗（选填，默认使用分类名）">
      </div>

      <div class="field">
        <label for="qaAmount">金额</label>
        <input id="qaAmount" type="number" min="0" step="0.01" placeholder="0.00" inputmode="decimal">
      </div>

      <div class="field">
        <label for="qaAccount">账户</label>
        <select id="qaAccount"></select>
      </div>

      <button class="btn btn--primary btn--block" id="qaSubmit">保存</button>
    </div>
  </div>

  <script src="js/common.js"></script>
  <script>if (!MF.isLoggedIn()) window.location.replace("index.html");</script>
  <script src="js/dashboard.js"></script>
</body>
</html>
